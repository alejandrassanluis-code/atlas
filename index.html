<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="
            width=device-width,
            initial-scale=1,
            maximum-scale=1,
            viewport-fit=cover
        "
    >

    <meta
        name="theme-color"
        content="#0b1020"
    >

    <meta
        name="apple-mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent"
    >

    <meta
        name="apple-mobile-web-app-title"
        content="Atlas"
    >

    <meta
        name="description"
        content="Atlas — Control financiero personal"
    >

    <title>Atlas</title>

    <link
        rel="manifest"
        href="manifest.json"
    >

    <link
        rel="apple-touch-icon"
        href="icons/icon-192.png"
    >

    <link
        rel="stylesheet"
        href="css/variables.css"
    >

    <link
        rel="stylesheet"
        href="css/layout.css"
    >

    <link
        rel="stylesheet"
        href="css/components.css"
    >

    <link
        rel="stylesheet"
        href="css/pages.css"
    >

    <style>

        .tabbar {
            min-height: 68px !important;
            height:
                calc(
                    68px +
                    env(
                        safe-area-inset-bottom
                    )
                ) !important;
            padding:
                5px
                12px
                env(
                    safe-area-inset-bottom
                ) !important;
            align-items: center !important;
        }

        .tabbar button:not(.fab) {
            min-height: 54px !important;
            padding:
                5px
                2px !important;
            gap: 2px !important;
        }

        .tabbar button:not(.fab) span {
            display: block;
            font-size: 25px;
            line-height: 1;
            margin: 0 0 3px;
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;
        }

        .tabbar button:not(.fab) small {
            display: block;
            font-size: 10px !important;
            line-height: 1.1;
        }

        .tabbar .fab {
            width: 56px !important;
            height: 56px !important;
            min-width: 56px !important;
            min-height: 56px !important;
            padding:
                0
                0
                5px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            border-radius: 19px !important;
            font-size: 36px !important;
            font-weight: 300 !important;
            line-height: 1 !important;
            transform:
                translateY(-8px);
        }

    </style>

</head>

<body>

    <main id="app"></main>

    <nav
        class="tabbar"
        aria-label="Navegación principal"
    >

        <button
            class="active"
            type="button"
            data-route="home"
            aria-label="Inicio"
        >

            <span aria-hidden="true">
                ⌂
            </span>

            <small>
                Inicio
            </small>

        </button>

        <button
            type="button"
            data-route="movements"
            aria-label="Movimientos"
        >

            <span aria-hidden="true">
                ☷
            </span>

            <small>
                Movimientos
            </small>

        </button>

        <button
            class="fab"
            type="button"
            data-action="newMovement"
            aria-label="Nuevo movimiento"
        >
            +
        </button>

        <button
            type="button"
            data-route="analysis"
            aria-label="Análisis"
        >

            <span aria-hidden="true">
                ◫
            </span>

            <small>
                Análisis
            </small>

        </button>

        <button
            type="button"
            data-route="ai"
            aria-label="Atlas IA"
        >

            <span aria-hidden="true">
                ✦
            </span>

            <small>
                IA
            </small>

        </button>

    </nav>

    <div
        id="modal-root"
        aria-live="polite"
    ></div>

    <div
        id="toast-root"
        aria-live="polite"
    ></div>

    <script src="js/catalog.js"></script>

    <script src="js/data.js"></script>

    <script src="js/storage.js"></script>

    <script src="js/calculations.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/setup.js"></script>

    <script src="js/movements.js"></script>

    <script src="js/settings.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
