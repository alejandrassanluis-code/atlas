<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="
            width=device-width,
            initial-scale=1,
            maximum-scale=1,
            viewport-fit=cover
        "
    >

    <meta
        name="theme-color"
        content="#0b1020"
    >

    <meta
        name="apple-mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent"
    >

    <meta
        name="apple-mobile-web-app-title"
        content="Atlas"
    >

    <meta
        name="description"
        content="Atlas — Control financiero personal"
    >

    <title>Atlas</title>

    <link
        rel="manifest"
        href="manifest.json"
    >

    <link
        rel="apple-touch-icon"
        href="icons/icon-192.png"
    >

    <link
        rel="stylesheet"
        href="css/variables.css"
    >

    <link
        rel="stylesheet"
        href="css/layout.css"
    >

    <link
        rel="stylesheet"
        href="css/components.css"
    >

    <link
        rel="stylesheet"
        href="css/pages.css"
    >

</head>

<body>

    <main id="app"></main>

    <nav
        class="tabbar"
        aria-label="Navegación principal"
    >

        <button
            class="active"
            type="button"
            data-route="home"
            aria-label="Inicio"
        >

            <span
                aria-hidden="true"
                style="
                    display:block;
                    font-size:25px;
                    line-height:1;
                    margin-bottom:5px;
                "
            >
                ⌂
            </span>

            <small>
                Inicio
            </small>

        </button>

        <button
            type="button"
            data-route="movements"
            aria-label="Movimientos"
        >

            <span
                aria-hidden="true"
                style="
                    display:block;
                    font-size:24px;
                    line-height:1;
                    margin-bottom:5px;
                "
            >
                ⇄
            </span>

            <small>
                Movimientos
            </small>

        </button>

        <button
            class="fab"
            type="button"
            data-action="newMovement"
            aria-label="Nuevo movimiento"
        >
            +
        </button>

        <button
            type="button"
            data-route="analysis"
            aria-label="Análisis"
        >

            <span
                aria-hidden="true"
                style="
                    display:block;
                    font-size:24px;
                    line-height:1;
                    margin-bottom:5px;
                "
            >
                ◫
            </span>

            <small>
                Análisis
            </small>

        </button>

        <button
            type="button"
            data-route="ai"
            aria-label="Atlas IA"
        >

            <span
                aria-hidden="true"
                style="
                    display:block;
                    font-size:24px;
                    line-height:1;
                    margin-bottom:5px;
                "
            >
                ✦
            </span>

            <small>
                IA
            </small>

        </button>

    </nav>

    <div
        id="modal-root"
        aria-live="polite"
    ></div>

    <div
        id="toast-root"
        aria-live="polite"
    ></div>

    <script src="js/catalog.js"></script>

    <script src="js/data.js"></script>

    <script src="js/storage.js"></script>

    <script src="js/calculations.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/setup.js"></script>

    <script src="js/movements.js"></script>

    <script src="js/settings.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
