<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="
            width=device-width,
            initial-scale=1,
            maximum-scale=1,
            viewport-fit=cover
        "
    >

    <meta
        name="theme-color"
        content="#0b1020"
    >

    <meta
        name="apple-mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent"
    >

    <meta
        name="apple-mobile-web-app-title"
        content="Atlas"
    >

    <meta
        name="description"
        content="Atlas — Control financiero personal"
    >

    <title>Atlas</title>

    <link
        rel="manifest"
        href="manifest.json"
    >

    <link
        rel="apple-touch-icon"
        href="icons/icon-192.png"
    >

    <link
        rel="stylesheet"
        href="css/variables.css"
    >

    <link
        rel="stylesheet"
        href="css/layout.css"
    >

    <link
        rel="stylesheet"
        href="css/components.css"
    >

    <link
        rel="stylesheet"
        href="css/pages.css"
    >

    <style>

        /* ==================================================
           MENÚ INFERIOR COMPACTO
        ================================================== */

        .tabbar {
            min-height: 68px !important;

            height:
                calc(
                    68px +
                    env(
                        safe-area-inset-bottom
                    )
                ) !important;

            padding:
                5px
                12px
                env(
                    safe-area-inset-bottom
                ) !important;

            align-items: center !important;
        }

        .tabbar button:not(.fab) {
            min-height: 54px !important;

            padding:
                5px
                2px !important;

            gap: 2px !important;
        }

        .tabbar button:not(.fab) span {
            display: block;

            margin:
                0
                0
                3px;

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                sans-serif;

            font-size: 25px;
            line-height: 1;
        }

        .tabbar button:not(.fab) small {
            display: block;

            font-size: 10px !important;
            line-height: 1.1;
        }

        .tabbar .fab {
            width: 56px !important;
            height: 56px !important;

            min-width: 56px !important;
            min-height: 56px !important;

            display: flex !important;

            align-items: center !important;
            justify-content: center !important;

            padding:
                0
                0
                4px !important;

            border-radius: 19px !important;

            font-size: 38px !important;
            font-weight: 300 !important;
            line-height: 1 !important;

            transform:
                translateY(-7px);
        }


        /* ==================================================
           INICIO
        ================================================== */

        #app > .app:has(> .grid) {
            height:
                calc(
                    100dvh -
                    68px -
                    env(
                        safe-area-inset-bottom
                    )
                ) !important;

            min-height: 0 !important;

            display: flex !important;
            flex-direction: column !important;

            justify-content:
                space-between !important;

            gap:
                clamp(
                    11px,
                    1.65vh,
                    18px
                ) !important;

            overflow: hidden !important;

            padding-bottom:
                calc(
                    78px +
                    env(
                        safe-area-inset-bottom
                    )
                ) !important;
        }


        /* ==================================================
           CABECERA
        ================================================== */

        #app > .app:has(> .grid) > .header {
            flex: 0 0 auto;

            margin: 0 !important;
        }


        /* ==================================================
           PATRIMONIO NETO
        ================================================== */

        #app > .app:has(> .grid) > .hero {
            flex: 0 0 auto;

            min-height: 0 !important;

            margin: 0 !important;

            padding:
                18px
                20px !important;
        }

        #app > .app:has(> .grid) > .hero .eyebrow {
            font-size: 12px !important;
        }

        #app > .app:has(> .grid) > .hero .value {
            margin-top: 7px !important;

            font-size: 38px !important;
            line-height: 1 !important;
        }

        #app > .app:has(> .grid) > .hero .trend {
            display: none !important;
        }


        /* ==================================================
           TARJETAS GLOBALES
        ================================================== */

        #app > .app:has(> .grid) > .grid {
            flex: 0 0 auto;

            display: grid !important;

            grid-template-columns:
                repeat(
                    2,
                    minmax(
                        0,
                        1fr
                    )
                ) !important;

            gap:
                clamp(
                    10px,
                    1.35vh,
                    14px
                ) !important;

            margin: 0 !important;
        }

        #app > .app:has(> .grid) > .grid .card {
            min-height:
                clamp(
                    84px,
                    10.5vh,
                    102px
                ) !important;

            padding:
                14px
                15px !important;
        }

        #app > .app:has(> .grid) > .grid .label {
            font-size: 11px !important;
            line-height: 1.25 !important;
        }

        #app > .app:has(> .grid) > .grid .num {
            margin-top: 9px !important;

            font-size: 23px !important;
            line-height: 1 !important;
        }


        /* ==================================================
           RESUMEN DEL MES
        ================================================== */

        #app > .app:has(> .grid) > button.panel {
            flex: 0 0 auto;

            width: 100% !important;

            min-height:
                clamp(
                    112px,
                    14vh,
                    132px
                ) !important;

            margin: 0 !important;

            padding:
                15px
                17px !important;
        }


        /* ==================================================
           IPHONES MÁS BAJOS
        ================================================== */

        @media (
            max-height: 720px
        ) {

            #app > .app:has(> .grid) {
                gap: 8px !important;
            }

            #app > .app:has(> .grid) > .hero {
                padding:
                    13px
                    17px !important;
            }

            #app > .app:has(> .grid) > .hero .value {
                font-size: 32px !important;
            }

            #app > .app:has(> .grid) > .grid {
                gap: 8px !important;
            }

            #app > .app:has(> .grid) > .grid .card {
                min-height: 74px !important;

                padding:
                    10px
                    12px !important;
            }

            #app > .app:has(> .grid) > .grid .num {
                margin-top: 6px !important;

                font-size: 20px !important;
            }

            #app > .app:has(> .grid) > button.panel {
                min-height: 96px !important;

                padding:
                    10px
                    13px !important;
            }

        }

    </style>

</head>

<body>

    <main id="app"></main>

    <nav
        class="tabbar"
        aria-label="Navegación principal"
    >

        <button
            class="active"
            type="button"
            data-route="home"
            aria-label="Inicio"
        >

            <span aria-hidden="true">
                ⌂
            </span>

            <small>
                Inicio
            </small>

        </button>

        <button
            type="button"
            data-route="movements"
            aria-label="Movimientos"
        >

            <span aria-hidden="true">
                ☷
            </span>

            <small>
                Movimientos
            </small>

        </button>

        <button
            class="fab"
            type="button"
            data-action="newMovement"
            aria-label="Nuevo movimiento"
        >
            +
        </button>

        <button
            type="button"
            data-route="analysis"
            aria-label="Análisis"
        >

            <span aria-hidden="true">
                ◫
            </span>

            <small>
                Análisis
            </small>

        </button>

        <button
            type="button"
            data-route="ai"
            aria-label="Atlas IA"
        >

            <span aria-hidden="true">
                ✦
            </span>

            <small>
                IA
            </small>

        </button>

    </nav>

    <div
        id="modal-root"
        aria-live="polite"
    ></div>

    <div
        id="toast-root"
        aria-live="polite"
    ></div>

    <script src="js/catalog.js"></script>

    <script src="js/data.js"></script>

    <script src="js/storage.js"></script>

    <script src="js/calculations.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/setup.js"></script>

    <script src="js/movements.js"></script>

    <script src="js/settings.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
