<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="
            width=device-width,
            initial-scale=1,
            maximum-scale=1,
            viewport-fit=cover
        "
    >

    <meta
        name="theme-color"
        content="#0b1020"
    >

    <meta
        name="apple-mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent"
    >

    <meta
        name="apple-mobile-web-app-title"
        content="Atlas"
    >

    <meta
        name="description"
        content="Atlas — Control financiero personal"
    >

    <title>Atlas</title>

    <link
        rel="manifest"
        href="manifest.json"
    >

    <link
        rel="apple-touch-icon"
        href="icons/icon-192.png"
    >

    <link
        rel="stylesheet"
        href="css/variables.css"
    >

    <link
        rel="stylesheet"
        href="css/layout.css"
    >

    <link
        rel="stylesheet"
        href="css/components.css"
    >

    <link
        rel="stylesheet"
        href="css/pages.css"
    >

    <style>

        .tabbar {
            min-height: 68px !important;

            height:
                calc(
                    68px +
                    env(
                        safe-area-inset-bottom
                    )
                ) !important;

            display: grid !important;

            grid-template-columns:
                repeat(
                    6,
                    minmax(
                        0,
                        1fr
                    )
                ) !important;

            align-items: center !important;

            padding:
                5px
                5px
                env(
                    safe-area-inset-bottom
                ) !important;
        }

        .tabbar button {
            min-width: 0 !important;
            min-height: 56px !important;

            display: grid !important;

            grid-template-rows:
                28px
                12px;

            align-items: center !important;
            justify-items: center !important;

            row-gap: 4px !important;

            padding:
                4px
                1px !important;

            border: 0 !important;
            border-radius: 14px !important;

            background: transparent !important;

            color: #f7f8fc !important;
        }

        .tabbar button .tabbar-icon {
            width: 28px !important;
            height: 28px !important;

            display: flex !important;

            align-items: center !important;
            justify-content: center !important;

            margin: 0 !important;
            padding: 0 !important;

            color: inherit !important;
        }

        .tabbar button .tabbar-icon svg {
            width: 26px !important;
            height: 26px !important;

            display: block !important;

            fill: none !important;
            stroke: currentColor !important;

            stroke-width: 2 !important;
            stroke-linecap: round !important;
            stroke-linejoin: round !important;

            overflow: visible;
        }

        .tabbar button small {
            display: block;

            width: 100%;
            max-width: 100%;

            margin: 0 !important;

            overflow: hidden;

            color: inherit !important;

            font-size: 8px !important;
            font-weight: 500 !important;
            line-height: 12px !important;

            text-align: center;

            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .tabbar button.active {
            color:
                var(
                    --color-primary
                ) !important;
        }

        #app > .app:has(> .grid) {
            height:
                calc(
                    100dvh -
                    68px -
                    env(
                        safe-area-inset-bottom
                    )
                ) !important;

            min-height: 0 !important;

            display: flex !important;
            flex-direction: column !important;

            justify-content:
                space-between !important;

            gap:
                clamp(
                    11px,
                    1.65vh,
                    18px
                ) !important;

            overflow: hidden !important;

            padding-bottom:
                calc(
                    78px +
                    env(
                        safe-area-inset-bottom
                    )
                ) !important;
        }

        #app > .app.atlas-overview-dashboard-expanded {
            height: auto !important;

            min-height:
                calc(
                    100dvh -
                    68px -
                    env(
                        safe-area-inset-bottom
                    )
                ) !important;

            justify-content:
                flex-start !important;

            overflow-x: hidden !important;
            overflow-y: auto !important;

            padding-bottom:
                calc(
                    102px +
                    env(
                        safe-area-inset-bottom
                    )
                ) !important;
        }

        #app > .app:has(> .grid) > .header {
            flex: 0 0 auto;
            margin: 0 !important;
        }

        #app > .app:has(> .grid) > .hero {
            flex: 0 0 auto;

            min-height: 0 !important;

            margin: 0 !important;

            padding:
                18px
                20px !important;
        }

        #app > .app:has(> .grid) > .hero .eyebrow {
            font-size: 12px !important;
        }

        #app > .app:has(> .grid) > .hero .value {
            margin-top: 7px !important;

            font-size: 38px !important;
            line-height: 1 !important;
        }

        #app > .app:has(> .grid) > .hero .trend {
            display: none !important;
        }

        #app > .app:has(> .grid) > .grid {
            flex: 0 0 auto;

            display: grid !important;

            grid-template-columns:
                repeat(
                    2,
                    minmax(
                        0,
                        1fr
                    )
                ) !important;

            gap:
                clamp(
                    10px,
                    1.35vh,
                    14px
                ) !important;

            margin: 0 !important;
        }

        #app > .app:has(> .grid) > .grid .card {
            min-height:
                clamp(
                    84px,
                    10.5vh,
                    102px
                ) !important;

            padding:
                14px
                15px !important;
        }

        #app > .app:has(> .grid) > .grid .label {
            font-size: 11px !important;
            line-height: 1.25 !important;
        }

        #app > .app:has(> .grid) > .grid .num {
            margin-top: 9px !important;

            font-size: 23px !important;
            line-height: 1 !important;
        }

        #app
        > .app:has(> .grid)
        > .grid
        .atlas-overview-card-expanded {
            grid-column:
                1 / -1 !important;

            min-height:
                142px !important;

            padding:
                13px
                14px !important;
        }

        #app > .app:has(> .grid) > button.panel {
            flex: 0 0 auto;

            width: 100% !important;

            min-height:
                clamp(
                    112px,
                    14vh,
                    132px
                ) !important;

            margin: 0 !important;

            padding:
                15px
                17px !important;
        }

        @media (
            max-height: 720px
        ) {

            #app > .app:has(> .grid) {
                gap: 8px !important;
            }

            #app > .app:has(> .grid) > .hero {
                padding:
                    13px
                    17px !important;
            }

            #app > .app:has(> .grid) > .hero .value {
                font-size: 32px !important;
            }

            #app > .app:has(> .grid) > .grid {
                gap: 8px !important;
            }

            #app > .app:has(> .grid) > .grid .card {
                min-height: 74px !important;

                padding:
                    10px
                    12px !important;
            }

            #app
            > .app:has(> .grid)
            > .grid
            .atlas-overview-card-expanded {
                min-height:
                    132px !important;

                padding:
                    12px !important;
            }

            #app > .app:has(> .grid) > .grid .num {
                margin-top: 6px !important;

                font-size: 20px !important;
            }

            #app > .app:has(> .grid) > button.panel {
                min-height: 96px !important;

                padding:
                    10px
                    13px !important;
            }

        }

        @media (
            max-width: 350px
        ) {

            .tabbar {
                padding-left: 2px !important;
                padding-right: 2px !important;
            }

            .tabbar button {
                grid-template-rows:
                    26px
                    11px;
            }

            .tabbar button .tabbar-icon {
                width: 26px !important;
                height: 26px !important;
            }

            .tabbar button .tabbar-icon svg {
                width: 24px !important;
                height: 24px !important;
            }

            .tabbar button small {
                font-size: 7px !important;
                line-height: 11px !important;
            }

        }

    </style>

</head>

<body>

    <main id="app"></main>

    <nav
        class="tabbar"
        aria-label="Navegación principal"
    >

        <button
            class="active"
            type="button"
            data-route="home"
            aria-label="Inicio"
        >

            <span
                class="tabbar-icon"
                aria-hidden="true"
            >

                <svg viewBox="0 0 24 24">

                    <path
                        d="M3 10.5 12 3l9 7.5"
                    ></path>

                    <path
                        d="M5.5 9.5V21h13V9.5"
                    ></path>

                </svg>

            </span>

            <small>
                Inicio
            </small>

        </button>

        <button
            type="button"
            data-route="movements"
            aria-label="Movimientos"
        >

            <span
                class="tabbar-icon"
                aria-hidden="true"
            >

                <svg viewBox="0 0 24 24">

                    <path d="M9 6h12"></path>
                    <path d="M9 12h12"></path>
                    <path d="M9 18h12"></path>
                    <path d="M3 6h2"></path>
                    <path d="M3 12h2"></path>
                    <path d="M3 18h2"></path>

                </svg>

            </span>

            <small>
                Movimientos
            </small>

        </button>

        <button
            type="button"
            data-action="newMovement"
            aria-label="Añadir movimiento"
        >

            <span
                class="tabbar-icon"
                aria-hidden="true"
            >

                <svg viewBox="0 0 24 24">

                    <path d="M12 4v16"></path>
                    <path d="M4 12h16"></path>

                </svg>

            </span>

            <small>
                Añadir
            </small>

        </button>

        <button
            type="button"
            data-route="analysis"
            aria-label="Análisis"
        >

            <span
                class="tabbar-icon"
                aria-hidden="true"
            >

                <svg viewBox="0 0 24 24">

                    <path d="M4 19V10"></path>
                    <path d="M10 19V5"></path>
                    <path d="M16 19v-7"></path>
                    <path d="M22 19V8"></path>

                </svg>

            </span>

            <small>
                Análisis
            </small>

        </button>

        <button
            type="button"
            data-route="goals"
            aria-label="Objetivos"
        >

            <span
                class="tabbar-icon"
                aria-hidden="true"
            >

                <svg viewBox="0 0 24 24">

                    <circle
                        cx="12"
                        cy="12"
                        r="9"
                    ></circle>

                    <circle
                        cx="12"
                        cy="12"
                        r="5"
                    ></circle>

                    <circle
                        cx="12"
                        cy="12"
                        r="1"
                    ></circle>

                </svg>

            </span>

            <small>
                Objetivos
            </small>

        </button>

        <button
            type="button"
            data-route="budgets"
            aria-label="Presupuestos"
        >

            <span
                class="tabbar-icon"
                aria-hidden="true"
            >

                <svg viewBox="0 0 24 24">

                    <path
                        d="M12 3a9 9 0 1 0 9 9h-9z"
                    ></path>

                    <path
                        d="M14 3.2A9 9 0 0 1 20.8 10H14z"
                    ></path>

                </svg>

            </span>

            <small>
                Presup.
            </small>

        </button>

    </nav>

    <div
        id="modal-root"
        aria-live="polite"
    ></div>

    <div
        id="toast-root"
        aria-live="polite"
    ></div>

    <script src="js/catalog.js"></script>

    <script src="js/data.js"></script>

    <script src="js/storage.js"></script>

    <script src="js/calculations.js"></script>

    <script src="js/calculation-periods.js"></script>

    <script src="js/recurring.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/movement-list-limit.js"></script>

    <script src="js/overview.js"></script>

    <script src="js/budgets.js"></script>

    <script src="js/analysis.js"></script>

    <script src="js/analysis-snapshots.js"></script>

    <script src="js/movement-filters.js"></script>

    <script src="js/setup.js"></script>

    <script src="js/movements.js"></script>

    <script src="js/movement-periods.js"></script>

    <script src="js/settings.js"></script>

    <script src="js/snapshots.js"></script>

    <script src="js/backup.js"></script>

    <script src="js/goals.js"></script>

    <script src="js/pwa.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
