<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0B1020">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Atlas">
  <title>Atlas</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-180.png">
  <link rel="icon" href="assets/icon-192.png">

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="app" aria-live="polite"></div>

  <nav class="tabbar" aria-label="Navegación principal">
    <button class="tabbar__item is-active" data-route="home" aria-label="Inicio">
      <span class="tabbar__icon">⌂</span>
      <span class="tabbar__label">Inicio</span>
    </button>
    <button class="tabbar__item" data-route="movements" aria-label="Movimientos">
      <span class="tabbar__icon">⇄</span>
      <span class="tabbar__label">Movimientos</span>
    </button>
    <button class="tabbar__add" data-action="add-movement" aria-label="Añadir movimiento">
      <span>＋</span>
    </button>
    <button class="tabbar__item" data-route="analysis" aria-label="Análisis">
      <span class="tabbar__icon">⌁</span>
      <span class="tabbar__label">Análisis</span>
    </button>
    <button class="tabbar__item" data-route="settings" aria-label="Ajustes">
      <span class="tabbar__icon">⚙︎</span>
      <span class="tabbar__label">Ajustes</span>
    </button>
  </nav>

  <div id="modal-root"></div>
  <div id="toast-root" aria-live="assertive"></div>

  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
  <script src="js/calculations.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
